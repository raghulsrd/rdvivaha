<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | RADHA DIAMONDS</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/avantgarde-tk');

        :root {
            --black: #050505;
            --silver-light: #f5f5f5;
            --silver-mid: #a8a8a8;
            --silver-dark: #333333;
            --font-main: 'Avantgarde', 'TeX Gyre Adventor', 'URW Gothic L', sans-serif;
            --gradient-silver: linear-gradient(135deg, #ffffff 0%, #a8a8a8 50%, #4a4a4a 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--black); color: var(--silver-light); font-family: var(--font-main); overflow-x: hidden; line-height: 1.6; }

        /* --- BACKGROUND & CURSOR --- */
        #fluid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; pointer-events: none; }
        #custom-cursor { 
            width: 15px; height: 15px; background: white; border-radius: 50%; 
            position: fixed; pointer-events: none; z-index: 9999; box-shadow: 0 0 15px #fff; 
            transform: translate(-50%, -50%); 
        }

        /* --- HEADER --- */
        header { padding: 80px 10% 20px; text-align: center; }
        .back-link { 
            text-decoration: none; color: var(--silver-mid); letter-spacing: 5px; 
            font-size: 0.8rem; transition: 0.3s; display: inline-block; margin-bottom: 15px;
        }
        .back-link:hover { color: white; transform: translateX(-5px); }
        h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            letter-spacing: clamp(8px, 2vw, 15px); 
            background: var(--gradient-silver); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase;
        }

        /* --- CONTACT CONTAINER --- */
        .contact-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 60px; 
            padding: 40px 10% 80px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        /* --- FORM --- */
        .elaborate-form { display: flex; flex-direction: column; gap: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { 
            width: 100%; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--silver-dark); 
            padding: 18px; color: white; font-family: inherit; outline: none; transition: 0.4s;
        }
        input:focus, textarea:focus { border-color: white; background: rgba(255,255,255,0.08); }
        .btn-submit { 
            background: white; color: black; border: none; padding: 20px; 
            text-transform: uppercase; font-weight: bold; letter-spacing: 5px; 
            cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--silver-mid); letter-spacing: 8px; }

        /* --- MAP & INFO --- */
        .map-wrapper { 
            border: 1px solid var(--silver-dark); height: 400px; 
            filter: grayscale(1) invert(0.9) contrast(1.2); 
            transition: 0.8s; overflow: hidden; margin-bottom: 30px;
        }
        .map-wrapper:hover { filter: none; border-color: white; }
        iframe { width: 100%; height: 100%; border: none; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-item h4 { letter-spacing: 3px; color: white; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; }
        .info-item p { color: var(--silver-mid); font-size: 0.85rem; }

        .social-links { display: flex; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--silver-dark); }
        .social-links a { color: var(--silver-mid); text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .social-links a:hover { color: white; }

        /* --- FOOTER --- */
        footer { padding: 40px 10%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-copy { letter-spacing: 4px; font-size: 0.6rem; color: var(--silver-dark); }

        /* --- MOBILE ALIGNMENTS --- */
        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #custom-cursor { display: none !important; }
            header { padding: 60px 5% 20px; }
            .contact-container { grid-template-columns: 1fr; padding: 20px 7% 60px; gap: 50px; }
            .form-row { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .map-wrapper { height: 300px; filter: none; } /* Better visibility on mobile without hover */
            .btn-submit { padding: 22px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="fluid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <header>
        <a href="index.html" class="back-link">← BACK TO HOME</a>
        <h1>CONTACT US</h1>
    </header>

    <main class="contact-container">
        <section>
            <form class="elaborate-form" id="contactForm">
                <div class="form-row">
                    <input type="text" placeholder="FIRST NAME" required>
                    <input type="text" placeholder="LAST NAME" required>
                </div>
                <input type="email" placeholder="EMAIL ADDRESS" required>
                <select required>
                    <option value="" disabled selected>NATURE OF INQUIRY</option>
                    <option value="bespoke">BESPOKE DESIGN</option>
                    <option value="appointment">BOOK APPOINTMENT</option>
                    <option value="general">GENERAL INQUIRY</option>
                </select>
                <textarea rows="5" placeholder="YOUR MESSAGE" required></textarea>
                <button type="submit" class="btn-submit">SEND MESSAGE</button>
            </form>
            <p id="formStatus" style="margin-top: 20px; font-size: 0.7rem; letter-spacing: 2px; text-align: center; color: var(--silver-mid);"></p>
        </section>

        <section>
            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3910.334047602187!2d77.72795692554264!3d11.34047602187459!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMTHCsDIwJzI1LjciTiA3N8KwNDMnNDAuNiJF!5e0!3m2!1sen!2sin!4v1700000000000" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <h4>The Atelier</h4>
                    <p>RD Complex, 14, Muthurangam St,</p>
                    <p>Erode, Tamil Nadu 638001</p>
                </div>
                <div class="info-item">
                    <h4>Concierge</h4>
                    <p>+91 73737 47474</p>
                    <p>boutique@radha.com</p>
                </div>
            </div>

            <div class="social-links">
                <a href="#">INSTAGRAM</a>
                <a href="#">FACEBOOK</a>
                <a href="https://wa.me/7373747474">WHATSAPP</a>
                <a href="tel:7373747474">CALL</a>
            </div>
        </section>
    </main>

    <footer>
        <p class="footer-copy">RADHA DIAMONDS © 2025 | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        /* --- FLUID BACKGROUND --- */
        const canvas = document.getElementById('fluid-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, size, stepX = 10, stepY = 10, cols, buffer1, buffer2;

        function initFluid() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            cols = Math.floor(width / stepX) + 2;
            size = cols * (Math.floor(height / stepY) + 2);
            buffer1 = new Float32Array(size).fill(0);
            buffer2 = new Float32Array(size).fill(0);
        }

        function loop() {
            for (let i = cols; i < size - cols; i++) {
                buffer2[i] = ((buffer1[i-1] + buffer1[i+1] + buffer1[i-cols] + buffer1[i+cols]) / 2 - buffer2[i]) * 0.98;
            }
            [buffer1, buffer2] = [buffer2, buffer1];
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            for (let i = 1; i < cols - 1; i++) {
                for (let j = 1; j < (size / cols) - 1; j++) {
                    let index = i + j * cols;
                    if (Math.abs(buffer1[index]) > 0.1) {
                        ctx.moveTo(i * stepX, j * stepY);
                        ctx.lineTo(i * stepX + buffer1[index], j * stepY + buffer1[index]);
                    }
                }
            }
            ctx.stroke();
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', (e) => {
            let x = Math.floor(e.clientX / stepX) + 1;
            let y = Math.floor(e.clientY / stepY) + 1;
            if(x + y * cols < size) buffer1[x + y * cols] = 3;
            if (window.innerWidth > 768) {
                const cursor = document.getElementById('custom-cursor');
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        document.getElementById('contactForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    // 1. Capture Form Data
    const firstName = e.target.querySelector('input[placeholder="FIRST NAME"]').value;
    const lastName = e.target.querySelector('input[placeholder="LAST NAME"]').value;
    const email = e.target.querySelector('input[placeholder="EMAIL ADDRESS"]').value;
    const inquiry = e.target.querySelector('select').value;
    const message = e.target.querySelector('textarea').value;

    const status = document.getElementById('formStatus');
    status.innerText = "PREPARING WHATSAPP MESSAGE...";

    // 2. Format the Message
    const phoneNumber = "917373747474"; // International format (91 for India)
    const text = `*New Inquiry: Radha Diamonds*%0A%0A` +
                 `*Name:* ${firstName} ${lastName}%0A` +
                 `*Email:* ${email}%0A` +
                 `*Nature:* ${inquiry}%0A` +
                 `*Message:* ${message}`;

    // 3. Construct URL and Redirect
    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${text}`;

    setTimeout(() => {
        window.open(whatsappUrl, '_blank'); // Opens WhatsApp in a new tab
        status.innerText = "THANK YOU. REDIRECTED TO WHATSAPP.";
        e.target.reset();
    }, 1000);
});

        window.addEventListener('resize', initFluid);
        initFluid();
        loop();
    </script>
</body>
</html>
